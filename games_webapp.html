<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ONISTAR | Glass Game Library</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #c0c0c0, #e8e8e8, #f0f0f0);
  font-family: 'Poppins', sans-serif;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Liquid blur shapes */
.bg-shape {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(100px);
  animation: float 10s ease-in-out infinite alternate;
  z-index: 0;
}

.shape1 {
  background: #b0b0b0;
  top: -10%;
  left: -10%;
}

.shape2 {
  background: #d0d0d0;
  bottom: -10%;
  right: -10%;
  animation-delay: -5s;
}

.shape3 {
  background: #c8c8c8;
  top: 50%;
  left: 30%;
  width: 300px;
  height: 300px;
  animation-delay: -3s;
}

@keyframes float {
  0% { transform: translateY(0px) translateX(0px) scale(1);}
  50% { transform: translateY(30px) translateX(20px) scale(1.1);}
  100% { transform: translateY(0px) translateX(0px) scale(1);}
}

/* Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 10;
}

/* Glass Header */
.glass-header {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 40px;
  padding: 25px 30px;
  margin-bottom: 30px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  text-align: center;
  transform-style: preserve-3d;
  transition: 0.3s;
}

.glass-header:hover {
  transform: scale(1.02);
  background: rgba(255, 255, 255, 0.3);
}

.logo {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #4a4a4a, #2a2a2a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.logo span {
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 12px;
  color: #555;
  letter-spacing: 2px;
  margin-top: 8px;
}

/* Stats Cards - Glass */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 25px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 18px 12px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.3);
  transition: 0.3s;
  cursor: pointer;
}

.stat-card:hover {
  transform: translateY(-5px);
  background: rgba(255, 255, 255, 0.3);
  border-color: rgba(255, 255, 255, 0.5);
}

.stat-number {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #333, #111);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-label {
  font-size: 11px;
  color: #555;
  letter-spacing: 1px;
  margin-top: 5px;
}

/* Search Bar - Glass */
.search-wrapper {
  margin-bottom: 25px;
}

.search-box {
  width: 100%;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 50px;
  font-size: 14px;
  color: #333;
  font-family: 'Poppins', sans-serif;
  transition: 0.3s;
}

.search-box:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.35);
  border-color: rgba(255, 255, 255, 0.6);
}

.search-box::placeholder {
  color: #888;
}

/* Filter Sections - Glass */
.filter-section {
  margin-bottom: 20px;
}

.filter-title {
  font-size: 11px;
  color: #555;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-left: 5px;
}

.filter-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.filter-btn {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 8px 20px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 500;
  color: #444;
  cursor: pointer;
  transition: 0.2s;
  font-family: 'Poppins', sans-serif;
}

.filter-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.02);
}

.filter-btn.active {
  background: rgba(255, 255, 255, 0.5);
  border-color: rgba(255, 255, 255, 0.7);
  color: #000;
  font-weight: 600;
}

/* Games Grid - Glass Cards */
.games-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 25px;
  margin-bottom: 30px;
}

.game-card {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 16px;
  display: flex;
  gap: 18px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  transition: 0.3s;
  cursor: pointer;
}

.game-card:hover {
  transform: translateX(8px) scale(1.01);
  background: rgba(255, 255, 255, 0.3);
  border-color: rgba(255, 255, 255, 0.6);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

/* Game Icon */
.game-icon {
  width: 60px;
  height: 60px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  transition: 0.3s;
}

.game-card:hover .game-icon {
  transform: scale(1.05);
  background: rgba(255, 255, 255, 0.5);
}

.game-info {
  flex: 1;
}

.game-name {
  font-size: 17px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 4px;
}

.game-package {
  font-size: 10px;
  color: #666;
  font-family: monospace;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.game-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  font-size: 9px;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 500;
  background: rgba(0, 0, 0, 0.05);
  backdrop-filter: blur(4px);
}

.tag.android {
  background: rgba(61, 220, 132, 0.3);
  color: #1a5a2a;
}

.tag.ios {
  background: rgba(255, 255, 255, 0.6);
  color: #333;
}

.tag.appsflyer {
  background: rgba(0, 198, 255, 0.3);
  color: #0055aa;
}

.tag.adjust {
  background: rgba(255, 107, 53, 0.3);
  color: #aa3300;
}

.status-badge {
  background: rgba(0, 200, 83, 0.2);
  color: #2a7a3a;
  border: 1px solid rgba(0, 200, 83, 0.4);
}

.no-results {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 40px;
  text-align: center;
  color: #555;
}

/* Footer */
.glass-footer {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 15px;
  text-align: center;
  font-size: 10px;
  color: #666;
  border: 1px solid rgba(255, 255, 255, 0.2);
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="bg-shape shape3"></div>

<div class="container">
  <!-- Glass Header -->
  <div class="glass-header">
    <div class="logo">ONI<span>STAR</span></div>
    <div class="subtitle">✦ GLASS GAME LIBRARY ✦</div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats"></div>

  <!-- Search -->
  <div class="search-wrapper">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 search game or package...">
  </div>

  <!-- Filters -->
  <div class="filter-section">
    <div class="filter-title">PLATFORM</div>
    <div class="filter-buttons" id="platformFilters">
      <button class="filter-btn active" data-platform="all">ALL</button>
      <button class="filter-btn" data-platform="android">🤖 ANDROID</button>
      <button class="filter-btn" data-platform="ios">🍎 IOS</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-title">PROVIDER</div>
    <div class="filter-buttons" id="providerFilters">
      <button class="filter-btn active" data-provider="all">ALL</button>
      <button class="filter-btn" data-provider="appsflyer">📡 APPSFLYER</button>
      <button class="filter-btn" data-provider="adjust">📊 ADJUST</button>
      <button class="filter-btn" data-provider="singular">🎯 SINGULAR</button>
    </div>
  </div>

  <!-- Games List -->
  <div class="games-grid" id="gamesList">
    <div class="no-results">🎮 loading games...</div>
  </div>

  <!-- Footer -->
  <div class="glass-footer">
    ONISTAR • S2S BYPASS READY • GLASS EDITION
  </div>
</div>

<script>
  const GAMES_DB = {
    "appsflyer": {
      "domino_dreams": {
        "name": "Domino Dreams",
        "package": "com.screenshake.dominodreams",
        "android": true,
        "ios": false,
        "icon": "🎲",
        "color": "#ff6b6b"
      },
      "sunshine_island": {
        "name": "Sunshine Island",
        "package": "com.newmoonproduction.sunshineisland",
        "android": true,
        "ios": false,
        "icon": "🏝️",
        "color": "#ffd93d"
      },
      "nations_of_darkness": {
        "name": "Nations of Darkness",
        "package": "com.allstarunion.nod",
        "android": true,
        "ios": true,
        "icon": "🌑",
        "color": "#9b59b6"
      },
      "dice_dreams": {
        "name": "Dice Dreams",
        "package": "com.superplaystudios.dicedreams",
        "android": true,
        "ios": false,
        "icon": "🎲",
        "color": "#3498db"
      }
    },
    "adjust": {},
    "singular": {}
  };

  let currentPlatform = "all";
  let currentProvider = "all";
  let searchTerm = "";

  function updateStats() {
    let total = 0, appsflyer = 0, adjust = 0, singular = 0, active = 0;
    for (const [provider, games] of Object.entries(GAMES_DB)) {
      for (const [id, game] of Object.entries(games)) {
        total++;
        active++;
        if (provider === "appsflyer") appsflyer++;
        if (provider === "adjust") adjust++;
        if (provider === "singular") singular++;
      }
    }
    document.getElementById("stats").innerHTML = `
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">GAMES</div></div>
      <div class="stat-card"><div class="stat-number">${appsflyer}</div><div class="stat-label">APPSFLYER</div></div>
      <div class="stat-card"><div class="stat-number">${active}</div><div class="stat-label">ACTIVE</div></div>
    `;
  }

  function renderGames() {
    const container = document.getElementById("gamesList");
    let html = "";
    let count = 0;

    for (const [provider, games] of Object.entries(GAMES_DB)) {
      for (const [id, game] of Object.entries(games)) {
        if (searchTerm && !game.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !game.package.toLowerCase().includes(searchTerm.toLowerCase())) continue;
        if (currentPlatform !== "all") {
          if (currentPlatform === "android" && !game.android) continue;
          if (currentPlatform === "ios" && !game.ios) continue;
        }
        if (currentProvider !== "all" && currentProvider !== provider) continue;
        count++;

        let tags = `<span class="tag ${provider}">📡 ${provider.toUpperCase()}</span>`;
        if (game.android) tags += `<span class="tag android">🤖 ANDROID</span>`;
        if (game.ios) tags += `<span class="tag ios">🍎 IOS</span>`;
        tags += `<span class="tag status-badge">● ACTIVE</span>`;

        html += `
          <div class="game-card">
            <div class="game-icon">${game.icon}</div>
            <div class="game-info">
              <div class="game-name">${game.name}</div>
              <div class="game-package">${game.package}</div>
              <div class="game-tags">${tags}</div>
            </div>
          </div>
        `;
      }
    }

    if (count === 0) {
      html = `<div class="no-results">🎮 NO GAMES FOUND<br><span style="font-size:12px;">try different filters</span></div>`;
    }
    container.innerHTML = html;
  }

  // Event Listeners
  document.querySelectorAll("[data-platform]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-platform]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentPlatform = btn.dataset.platform;
      renderGames();
    });
  });

  document.querySelectorAll("[data-provider]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-provider]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentProvider = btn.dataset.provider;
      renderGames();
    });
  });

  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    renderGames();
  });

  updateStats();
  renderGames();
</script>
</body>
</html>
