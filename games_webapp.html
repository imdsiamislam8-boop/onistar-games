<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ONISTAR | Game Library</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: 0 auto;
}

.glass-header {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 25px;
  text-align: center;
  margin-bottom: 25px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.logo {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
}

.logo span {
  background: linear-gradient(135deg, #FFD700, #FFA500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 5px;
  letter-spacing: 2px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 25px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.12);
}

.stat-number {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
}

.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
}

.search-box {
  width: 100%;
  padding: 14px 20px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 30px;
  color: #fff;
  font-size: 14px;
  margin-bottom: 20px;
}

.search-box::placeholder {
  color: rgba(255,255,255,0.4);
}

.search-box:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.3);
}

.filter-section {
  margin-bottom: 15px;
}

.filter-title {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  margin-bottom: 10px;
  padding-left: 5px;
}

.filter-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.filter-btn {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.12);
  padding: 8px 18px;
  border-radius: 25px;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover {
  background: rgba(255, 255, 255, 0.12);
}

.filter-btn.active {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.35);
}

.games-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 20px 0;
}

.game-card {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(15px);
  border-radius: 22px;
  padding: 16px;
  display: flex;
  gap: 15px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.2s;
}

.game-card:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: translateX(5px);
}

.game-icon {
  width: 55px;
  height: 55px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

.game-info {
  flex: 1;
}

.game-name {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
}

.game-package {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  font-family: monospace;
  margin-bottom: 8px;
}

.game-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  font-size: 9px;
  padding: 3px 10px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
}

.tag.android {
  background: rgba(61, 220, 132, 0.25);
  border: 1px solid rgba(61, 220, 132, 0.4);
}

.tag.ios {
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.25);
}

.tag.appsflyer {
  background: rgba(0, 198, 255, 0.25);
  border: 1px solid rgba(0, 198, 255, 0.4);
}

.no-results {
  text-align: center;
  padding: 40px;
  color: rgba(255,255,255,0.4);
}

.footer {
  text-align: center;
  padding: 15px;
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="glass-header">
    <div class="logo">ONI<span>STAR</span></div>
    <div class="subtitle">✦ GLASS GAME LIBRARY ✦</div>
  </div>

  <div class="stats-grid" id="stats"></div>

  <input type="text" class="search-box" id="searchInput" placeholder="🔍 search game or package...">

  <div class="filter-section">
    <div class="filter-title">PLATFORM</div>
    <div class="filter-buttons" id="platformFilters">
      <button class="filter-btn active" data-platform="all">ALL</button>
      <button class="filter-btn" data-platform="android">🤖 ANDROID</button>
      <button class="filter-btn" data-platform="ios">🍎 IOS</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-title">PROVIDER</div>
    <div class="filter-buttons" id="providerFilters">
      <button class="filter-btn active" data-provider="all">ALL</button>
      <button class="filter-btn" data-provider="appsflyer">📡 APPSFLYER</button>
    </div>
  </div>

  <div class="games-list" id="gamesList">🎮 loading games...</div>

  <div class="footer">ONISTAR • S2S BYPASS API • GLASS EDITION</div>
</div>

<script>
const GAMES_DB = {
  "appsflyer": {
    "domino_dreams": {
      "name": "Domino Dreams",
      "package": "com.screenshake.dominodreams",
      "android": true,
      "ios": false,
      "icon": "🎲"
    },
    "sunshine_island": {
      "name": "Sunshine Island",
      "package": "com.newmoonproduction.sunshineisland",
      "android": true,
      "ios": false,
      "icon": "🏝️"
    },
    "nations_of_darkness": {
      "name": "Nations of Darkness",
      "package": "com.allstarunion.nod",
      "android": true,
      "ios": true,
      "icon": "🌑"
    },
    "dice_dreams": {
      "name": "Dice Dreams",
      "package": "com.superplaystudios.dicedreams",
      "android": true,
      "ios": false,
      "icon": "🎲"
    }
  }
};

let currentPlatform = "all";
let currentProvider = "all";
let searchTerm = "";

function updateStats() {
  let total = Object.keys(GAMES_DB.appsflyer).length;
  document.getElementById("stats").innerHTML = `
    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">GAMES</div></div>
    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">APPSFLYER</div></div>
    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">ACTIVE</div></div>
  `;
}

function renderGames() {
  const container = document.getElementById("gamesList");
  let html = "";
  let count = 0;

  for (const [id, game] of Object.entries(GAMES_DB.appsflyer)) {
    if (searchTerm && !game.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
        !game.package.toLowerCase().includes(searchTerm.toLowerCase())) {
      continue;
    }
    
    if (currentPlatform !== "all") {
      if (currentPlatform === "android" && !game.android) continue;
      if (currentPlatform === "ios" && !game.ios) continue;
    }
    
    if (currentProvider !== "all" && currentProvider !== "appsflyer") continue;
    
    count++;
    
    let tags = `<span class="tag appsflyer">📡 APPSFLYER</span>`;
    if (game.android) tags += `<span class="tag android">🤖 ANDROID</span>`;
    if (game.ios) tags += `<span class="tag ios">🍎 IOS</span>`;
    
    html += `
      <div class="game-card">
        <div class="game-icon">${game.icon}</div>
        <div class="game-info">
          <div class="game-name">${game.name}</div>
          <div class="game-package">${game.package}</div>
          <div class="game-tags">${tags}</div>
        </div>
      </div>
    `;
  }
  
  if (count === 0) {
    html = `<div class="no-results">🎮 NO GAMES FOUND<br><span style="font-size:11px;">try different filters</span></div>`;
  }
  
  container.innerHTML = html;
}

document.querySelectorAll("[data-platform]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-platform]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentPlatform = btn.dataset.platform;
    renderGames();
  });
});

document.querySelectorAll("[data-provider]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-provider]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentProvider = btn.dataset.provider;
    renderGames();
  });
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  renderGames();
});

updateStats();
renderGames();
</script>
</body>
</html>
