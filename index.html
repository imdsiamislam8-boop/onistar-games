<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ONISTAR | EMERALD FOREST — Blade Shine Effect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 0.8rem;
            position: relative;
            overflow-x: hidden;
            transition: background 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.4s ease;
        }

        /* ========== THEME SYSTEM - EMERALD FOREST DEFAULT ========== */
        :root {
            --bg-gradient-start: #134e5e;
            --bg-gradient-end: #71b280;
            --glass-bg: rgba(30, 60, 40, 0.45);
            --glass-border: rgba(46, 204, 113, 0.4);
            --text-primary: #eaffea;
            --text-secondary: #c8e0b0;
            --accent-1: #2ecc71;
            --accent-2: #27ae60;
            --glow-color: rgba(46, 204, 113, 0.5);
            --currency-color: rgba(46, 204, 113, 0.3);
        }

        body[data-theme="ocean"] {
            --bg-gradient-start: #00b4db;
            --bg-gradient-end: #0083b0;
            --glass-bg: rgba(0, 50, 70, 0.45);
            --accent-1: #00d2ff;
            --accent-2: #3a7bd5;
            --glow-color: rgba(0, 210, 255, 0.5);
            --currency-color: rgba(0, 210, 255, 0.3);
        }
        body[data-theme="midnight"] {
            --bg-gradient-start: #0f0c29;
            --bg-gradient-end: #302b63;
            --glass-bg: rgba(15, 20, 35, 0.55);
            --accent-1: #6c63ff;
            --accent-2: #ff6584;
            --glow-color: rgba(108, 99, 255, 0.5);
            --currency-color: rgba(108, 99, 255, 0.35);
        }
        body[data-theme="sunset"] {
            --bg-gradient-start: #ff6b6b;
            --bg-gradient-end: #feca57;
            --glass-bg: rgba(255, 240, 200, 0.25);
            --glass-border: rgba(255, 200, 100, 0.4);
            --text-primary: #2d1b0a;
            --text-secondary: #5e3a1a;
            --accent-1: #ff9f43;
            --accent-2: #ee5a24;
            --glow-color: rgba(255, 159, 67, 0.5);
            --currency-color: rgba(255, 159, 67, 0.3);
        }
        body[data-theme="forest"] {
            --bg-gradient-start: #134e5e;
            --bg-gradient-end: #71b280;
            --glass-bg: rgba(30, 60, 40, 0.45);
            --text-primary: #eaffea;
            --text-secondary: #c8e0b0;
            --accent-1: #2ecc71;
            --accent-2: #27ae60;
            --glow-color: rgba(46, 204, 113, 0.5);
            --currency-color: rgba(46, 204, 113, 0.3);
        }
        body[data-theme="cherry"] {
            --bg-gradient-start: #ff9a9e;
            --bg-gradient-end: #fecfef;
            --glass-bg: rgba(255, 240, 245, 0.5);
            --glass-border: rgba(255, 180, 180, 0.5);
            --text-primary: #5e2a2a;
            --text-secondary: #a05050;
            --accent-1: #ff6b81;
            --accent-2: #ff4757;
            --glow-color: rgba(255, 107, 129, 0.5);
            --currency-color: rgba(255, 107, 129, 0.3);
        }
        body[data-theme="royal"] {
            --bg-gradient-start: #8e2de2;
            --bg-gradient-end: #4a00e0;
            --glass-bg: rgba(40, 20, 70, 0.5);
            --text-primary: #f0e8ff;
            --text-secondary: #d4c4ff;
            --accent-1: #f5af19;
            --accent-2: #f12711;
            --glow-color: rgba(245, 175, 25, 0.5);
            --currency-color: rgba(245, 175, 25, 0.3);
        }
        body[data-theme="mono"] {
            --bg-gradient-start: #1a1a1a;
            --bg-gradient-end: #2d2d2d;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-1: #ffffff;
            --accent-2: #888888;
            --glow-color: rgba(255, 255, 255, 0.3);
            --currency-color: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
        }

        /* Floating Currency Background */
        .currency-float-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .floating-currency {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 900;
            opacity: 0;
            animation: floatCurrency 15s linear infinite;
            color: var(--currency-color);
            text-shadow: 0 0 10px currentColor;
        }
        @keyframes floatCurrency {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.35; }
            80% { opacity: 0.25; }
            100% { transform: translateY(-20vh) translateX(50px) rotate(360deg); opacity: 0; }
        }

        .flow-line-wealth {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-1), var(--accent-2), transparent);
            animation: flowLineWealth 8s linear infinite;
            filter: blur(1px);
        }
        @keyframes flowLineWealth {
            0% { transform: translateX(-100%); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { transform: translateX(100vw); opacity: 0; }
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Glowing Orb Theme Switcher */
        .theme-orb-container {
            position: fixed;
            bottom: 1.2rem;
            right: 1.2rem;
            z-index: 200;
        }
        .glowing-orb {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, var(--accent-1), var(--accent-2));
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px var(--glow-color), 0 0 40px rgba(0,210,255,0.3);
            animation: orbPulse 2s ease-in-out infinite alternate;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .glowing-orb i {
            font-size: 1.5rem;
            color: white;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));
        }
        @keyframes orbPulse {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--glow-color); }
            100% { transform: scale(1.08); box-shadow: 0 0 35px var(--glow-color), 0 0 50px rgba(0,210,255,0.4); }
        }
        .glowing-orb:hover {
            transform: scale(1.05);
        }
        .theme-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 1.2rem;
            border: 1px solid var(--glass-border);
            padding: 0.6rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 150px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .theme-menu.show {
            display: flex;
        }
        .theme-menu-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .theme-menu-item:hover {
            background: rgba(255,255,255,0.15);
        }
        .theme-color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .dot-ocean { background: linear-gradient(135deg, #00b4db, #0083b0); }
        .dot-midnight { background: linear-gradient(135deg, #0f0c29, #302b63); }
        .dot-sunset { background: linear-gradient(135deg, #ff6b6b, #feca57); }
        .dot-forest { background: linear-gradient(135deg, #134e5e, #71b280); }
        .dot-cherry { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .dot-royal { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .dot-mono { background: linear-gradient(135deg, #1a1a1a, #444444); }

        /* Glass Header */
        .glass-header-premium {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        .animated-border {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-1));
            background-size: 200% 100%;
            animation: borderFlow 2.5s linear infinite;
        }
        @keyframes borderFlow {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
        .logo-area {
            text-align: center;
            padding: 0.8rem 0.8rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffe6a3, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            font-size: 0.55rem;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: flex;
            gap: 0.6rem;
            overflow-x: auto;
            margin-bottom: 1rem;
            justify-content: center;
            scrollbar-width: thin;
        }
        .stat-card-theme {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 0.9rem;
            padding: 0.35rem 0.7rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            min-width: 65px;
            flex-shrink: 0;
        }
        .stat-number {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-primary);
        }
        .stat-label {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Sticky Search */
        .sticky-search-area {
            position: sticky;
            top: 0.6rem;
            z-index: 150;
            margin-bottom: 1rem;
        }
        .search-glass-premium {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1rem;
            position: relative;
            overflow: hidden;
        }
        .search-glass-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            animation: bladeShine 3.5s infinite;
            pointer-events: none;
        }
        @keyframes bladeShine {
            0% { left: -100%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0,0,0,0.2);
            border-radius: 2.5rem;
            padding: 0.1rem 1rem;
            position: relative;
            z-index: 2;
        }
        .search-wrapper i { color: var(--accent-1); font-size: 0.8rem; }
        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            font-size: 0.75rem;
            outline: none;
            color: var(--text-primary);
        }
        #searchInput::placeholder { color: var(--text-secondary); opacity: 0.7; font-size: 0.7rem; }
        
        /* Filter Group */
        .filter-group-wrapper {
            margin-top: 0.6rem;
            position: relative;
            z-index: 2;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            justify-content: center;
        }
        .filter-chip-theme {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            padding: 0.2rem 0.9rem;
            border-radius: 1.5rem;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            white-space: nowrap;
        }
        .filter-chip-theme.active {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            border-color: transparent;
            box-shadow: 0 0 8px var(--glow-color);
        }

        /* Game Cards - WITH BLADE SHINE EFFECT ON HOVER */
        .games-grid-vibrant {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .game-card-vibrant {
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            border-radius: 1.2rem;
            padding: 0.8rem;
            display: flex;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            /* Rounded corners for the card */
            border-radius: 1.5rem;
        }
        /* BLADE SHINE EFFECT - Added this for game cards */
        .game-card-vibrant::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: linear-gradient(115deg, 
                transparent 30%, 
                rgba(255, 255, 255, 0.25) 45%, 
                rgba(255, 255, 255, 0.25) 55%, 
                transparent 70%);
            transform: rotate(25deg);
            transition: left 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }
        .game-card-vibrant:hover::after {
            left: 100%;
            opacity: 1;
        }
        .game-card-vibrant:hover {
            transform: translateY(-3px);
            border-color: var(--accent-1);
            box-shadow: 0 0 15px var(--glow-color);
        }
        .game-icon-vibrant {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .game-info-vibrant { flex: 1; }
        .game-name-vibrant { font-weight: 800; font-size: 0.85rem; color: var(--text-primary); }
        .game-package-vibrant { font-size: 0.5rem; font-family: monospace; color: var(--text-secondary); margin: 3px 0 5px; word-break: break-all; }
        .tags-vibrant {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .tag-vibrant {
            font-size: 0.45rem;
            font-weight: 700;
            padding: 0.15rem 0.6rem;
            border-radius: 1.5rem;
            background: rgba(0,0,0,0.4);
        }
        .tag-android { background: rgba(46, 204, 113, 0.5); color: #ccffcc; }
        .tag-ios { background: rgba(52, 152, 219, 0.5); color: #ccddff; }
        .tag-appsflyer { background: rgba(90, 200, 192, 0.5); color: #aaffdd; }
        .tag-adjust { background: rgba(230, 126, 34, 0.5); color: #ffe0aa; }
        .tag-singular { background: rgba(155, 89, 182, 0.5); color: #e0ccff; }

        /* Pagination */
        .pagination-vibrant {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .page-btn-vibrant {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            font-weight: 600;
            font-size: 0.65rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .page-btn-vibrant.active {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
        }
        .disabled { opacity: 0.4; pointer-events: none; }

        /* Detail View */
        .detail-vibrant {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            animation: slideUp 0.4s ease;
            border: 1px solid var(--glass-border);
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .detail-vibrant.has-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 1.5rem;
            z-index: 0;
        }
        .detail-vibrant.has-bg > * { position: relative; z-index: 1; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-icon-vibrant {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            border-radius: 1.5rem;
            margin: 0 auto 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .detail-title-vibrant {
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-1));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .detail-meta-vibrant {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 0.7rem;
            margin-top: 0.8rem;
        }
        .detail-row-vibrant {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-size: 0.7rem;
        }
        .detail-row-vibrant:last-child {
            border-bottom: none;
        }
        .back-btn-vibrant {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            width: 100%;
            padding: 0.7rem;
            border-radius: 1.5rem;
            text-align: center;
            margin-top: 0.8rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            color: white;
        }
        .hidden { display: none; }
        .no-results-vibrant {
            text-align: center;
            padding: 1.5rem;
            background: var(--glass-bg);
            border-radius: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            font-size: 0.5rem;
            padding: 0.6rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            margin-top: 0.8rem;
            color: var(--text-secondary);
        }
        /* Rounded hover effect for phone image */
        .game-icon-vibrant img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.8rem;
        }
        /* Add a slight round corner to the phone icon area on hover */
        .game-card-vibrant:hover .game-icon-vibrant {
            border-radius: 1rem;
            transition: border-radius 0.3s ease;
        }
        @media (min-width: 640px) {
            body { padding: 1rem; }
            .games-grid-vibrant { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
            .game-card-vibrant { padding: 1rem; }
            .game-icon-vibrant { width: 60px; height: 60px; font-size: 1.8rem; }
            .stat-card-theme { min-width: 75px; padding: 0.4rem 0.8rem; }
            .stat-number { font-size: 1.1rem; }
        }
    </style>
</head>
<body data-theme="forest">
    <div class="currency-float-bg" id="currencyFloatBg"></div>

    <!-- Glowing Orb Theme Switcher -->
    <div class="theme-orb-container">
        <div class="glowing-orb" id="themeOrb">
            <i class="fas fa-palette"></i>
        </div>
        <div class="theme-menu" id="themeMenu">
            <div class="theme-menu-item" data-theme="ocean">
                <div class="theme-color-dot dot-ocean"></div>
                <span>Deep Ocean</span>
            </div>
            <div class="theme-menu-item" data-theme="midnight">
                <div class="theme-color-dot dot-midnight"></div>
                <span>Midnight Nebula</span>
            </div>
            <div class="theme-menu-item" data-theme="sunset">
                <div class="theme-color-dot dot-sunset"></div>
                <span>Sunset Blaze</span>
            </div>
            <div class="theme-menu-item" data-theme="forest">
                <div class="theme-color-dot dot-forest"></div>
                <span>Emerald Forest</span>
            </div>
            <div class="theme-menu-item" data-theme="cherry">
                <div class="theme-color-dot dot-cherry"></div>
                <span>Cherry Sakura</span>
            </div>
            <div class="theme-menu-item" data-theme="royal">
                <div class="theme-color-dot dot-royal"></div>
                <span>Royal Purple</span>
            </div>
            <div class="theme-menu-item" data-theme="mono">
                <div class="theme-color-dot dot-mono"></div>
                <span>Black & White</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="mainView">
            <div class="glass-header-premium">
                <div class="animated-border"></div>
                <div class="logo-area">
                    <div class="logo"><i class="fas fa-tree"></i> ONISTAR <i class="fas fa-chart-line"></i></div>
                    <div class="subhead">✦ EMERALD FOREST • BLADE SHINE ✦</div>
                </div>
            </div>

        function updateStats() {

                <div class="stat-card-theme"><div class="stat-number">${total}</div><div class="stat-label">TOTAL</div></div>

                <div class="stat-card-theme"><div class="stat-number">${total}</div><div class="stat-label">ACTIVE</div></div>
            `;
        }

        function getFiltered() {
            return allGames.filter(g => {
                const matchSearch = searchTerm === "" || g.name.toLowerCase().includes(searchTerm.toLowerCase()) || g.package.toLowerCase().includes(searchTerm.toLowerCase());
                const matchPlatform = currentPlatform === "all" ? true : (currentPlatform === "android" ? g.android : g.ios);
                const matchProvider = currentProvider === "all" ? true : g.provider === currentProvider;
                return matchSearch && matchPlatform && matchProvider;
            });
        }

        function getIconHtml(g) {
            if(g.image && g.image.startsWith("http")) return `<img src="${g.image}" style="width:100%;height:100%;object-fit:cover; border-radius:0.8rem;">`;
            return g.icon;
        }

        function renderGames() {
            const filtered = getFiltered();
            const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if(currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage-1)*perPage;
            const pageGames = filtered.slice(start, start+perPage);
            const container = document.getElementById("gamesGrid");
            if(!pageGames.length) {
                container.innerHTML = `<div class="no-results-vibrant"><i class="fas fa-tree"></i> No games found</div>`;
                document.getElementById("paginationArea").innerHTML = "";
                return;
            }
            let html = "";
            pageGames.forEach(g => {
                let providerTag = g.provider === "appsflyer" ? "tag-appsflyer" : (g.provider === "adjust" ? "tag-adjust" : "tag-singular");
                let tags = `<span class="tag-vibrant ${providerTag}">📡 ${g.provider.toUpperCase()}</span>`;
                if(g.android) tags += `<span class="tag-vibrant tag-android">🤖 ANDROID</span>`;
                if(g.ios) tags += `<span class="tag-vibrant tag-ios">🍎 IOS</span>`;
                tags += `<span class="tag-vibrant" style="background:rgba(90,200,192,0.4);">● ACTIVE</span>`;
                html += `
                    <div class="game-card-vibrant" data-id="${g.id}" data-prov="${g.provider}">
                        <div class="game-icon-vibrant">${getIconHtml(g)}</div>
                        <div class="game-info-vibrant">
                            <div class="game-name-vibrant">${escapeHtml(g.name)}</div>
                            <div class="game-package-vibrant">${g.package}</div>
                            <div class="tags-vibrant">${tags}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.querySelectorAll(".game-card-vibrant").forEach(card => {
                card.addEventListener("click", () => {
                    const id = card.getAttribute("data-id");
                    const prov = card.getAttribute("data-prov");
                    showDetail(id, prov);
                });
            });
            renderPagination(totalPages);
        }

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        function renderPagination(totalPages) {
            const wrap = document.getElementById("paginationArea");
            if(totalPages <= 1) { wrap.innerHTML = ""; return; }
            let btns = `<button class="page-btn-vibrant ${currentPage===1 ? 'disabled' : ''}" data-page="prev">◀ PREV</button>`;
            for(let i=1;i<=totalPages;i++) {
                if(i===1 || i===totalPages || (i>=currentPage-2 && i<=currentPage+2)) {
                    btns += `<button class="page-btn-vibrant ${currentPage===i ? 'active' : ''}" data-page="${i}">${i}</button>`;
                } else if(i===currentPage-3 || i===currentPage+3) btns += `<span style="padding:0 4px;">...</span>`;
            }
            btns += `<button class="page-btn-vibrant ${currentPage===totalPages ? 'disabled' : ''}" data-page="next">NEXT ▶</button>`;
            wrap.innerHTML = btns;
            wrap.querySelectorAll("[data-page]").forEach(btn => {
                btn.addEventListener("click", () => {
                    let val = btn.getAttribute("data-page");
                    if(val === "prev" && currentPage > 1) changePage(currentPage-1);
                    else if(val === "next" && currentPage < totalPages) changePage(currentPage+1);
                    else if(!isNaN(parseInt(val))) changePage(parseInt(val));
                });
            });
        }

        function changePage(p) {
            currentPage = p;
            renderGames();
            window.scrollTo({ top: 180, behavior: 'smooth' });
        }

        function showDetail(id, provider) {
    const game = allGames.find(g => g.id === id && g.provider === provider);
    if(!game) return;
    const platforms = [];
    if(game.android) platforms.push("🤖 Android");
    if(game.ios) platforms.push("🍎 iOS");
    const detailDiv = document.querySelector(".detail-vibrant");
    if(game.bg_image && game.bg_image !== "") {
        detailDiv.style.backgroundImage = `url('${game.bg_image}')`;
        detailDiv.classList.add("has-bg");
    } else {
        detailDiv.style.backgroundImage = "none";
        detailDiv.classList.remove("has-bg");
    }
    
    // Purchase status display
    const purchaseStatus = game.purchase_enabled ? "✅ ENABLED" : "❌ DISABLED";
    const purchaseColor = game.purchase_enabled ? "#2ecc71" : "#ff6b6b";
    
    // 🔥 এখানে শর্ত যোগ করুন: যদি provider "adjust" হয় তাহলে GAID দেখাবে, নাহলে AppsFlyer ID দেখাবে
    let identifierHtml = '';

        identifierHtml = `<div class="detail-row-vibrant"><span>🆔 GAID</span><span>${game.gaid || game.dev_key || '—'}</span></div>`;
    } else {
        identifierHtml = `<div class="detail-row-vibrant"><span>🆔 AppsFlyer ID</span><span>${game.dev_key || '—'}</span></div>`;
    }
    
    const detailHtml = `
        <div class="detail-icon-vibrant">${getIconHtml(game)}</div>
        <div class="detail-title-vibrant">${escapeHtml(game.name)}</div>
        <div style="text-align:center;font-size:0.6rem;color:var(--text-secondary);margin-top:3px;">${game.package}</div>
        <div class="detail-meta-vibrant">
            <div class="detail-row-vibrant"><span>📡 Provider</span><span>${game.provider.toUpperCase()}</span></div>
            <div class="detail-row-vibrant"><span>📱 Platform</span><span>${platforms.join(" | ")}</span></div>
            <div class="detail-row-vibrant"><span>✅ Status</span><span>Active</span></div>
            ${identifierHtml}
            <div class="detail-row-vibrant"><span>📌 Event</span><span>${game.event_format || 'dynamic'}</span></div>
            <div class="detail-row-vibrant"><span>🛒 Purchase</span><span style="color:${purchaseColor};">${purchaseStatus}</span></div>
        </div>
    `;
    document.getElementById("detailContainer").innerHTML = detailHtml;
    document.getElementById("mainView").classList.add("hidden");
    document.getElementById("detailView").classList.remove("hidden");
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

        function showMainView() {
            document.getElementById("mainView").classList.remove("hidden");
            document.getElementById("detailView").classList.add("hidden");
            renderGames();
            updateStats();
        }

        function initFilters() {
            const platformDiv = document.getElementById("platformFilters");
            const providerDiv = document.getElementById("providerFilters");
            platformDiv.innerHTML = `<div class="filter-chip-theme active" data-filter="platform" data-val="all">🌍 ALL</div>
                                     <div class="filter-chip-theme" data-filter="platform" data-val="android">🤖 ANDROID</div>
                                     <div class="filter-chip-theme" data-filter="platform" data-val="ios">🍎 IOS</div>`;
            providerDiv.innerHTML = `<div class="filter-chip-theme active" data-filter="provider" data-val="all">📡 ALL</div>
                                     <div class="filter-chip-theme" data-filter="provider" data-val="appsflyer">📊 APPSFLYER</div>
                                     <div class="filter-chip-theme" data-filter="provider" data-val="adjust">📈 ADJUST</div>
                                     <div class="filter-chip-theme" data-filter="provider" data-val="singular">🎯 SINGULAR</div>`;
            document.querySelectorAll(".filter-chip-theme").forEach(chip => {
                chip.addEventListener("click", () => {
                    const type = chip.getAttribute("data-filter");
                    const val = chip.getAttribute("data-val");
                    if(type === "platform") {
                        currentPlatform = val;
                        document.querySelectorAll("#platformFilters .filter-chip-theme").forEach(c => c.classList.remove("active"));
                    } else {
                        currentProvider = val;
                        document.querySelectorAll("#providerFilters .filter-chip-theme").forEach(c => c.classList.remove("active"));
                    }
                    chip.classList.add("active");
                    currentPage = 1;
                    renderGames();
                });
            });
        }

        // Theme Switcher
        const themeOrb = document.getElementById("themeOrb");
        const themeMenu = document.getElementById("themeMenu");
        
        themeOrb.addEventListener("click", (e) => {
            e.stopPropagation();
            themeMenu.classList.toggle("show");
        });
        
        document.querySelectorAll(".theme-menu-item").forEach(item => {
            item.addEventListener("click", () => {
                const theme = item.getAttribute("data-theme");
                document.body.setAttribute("data-theme", theme);
                localStorage.setItem("onistar_theme", theme);
                themeMenu.classList.remove("show");
                const computedStyle = getComputedStyle(document.body);
                themeOrb.style.background = `radial-gradient(circle at 30% 30%, var(--accent-1), var(--accent-2))`;
            });
        });
        
        document.addEventListener("click", (e) => {
            if (!themeOrb.contains(e.target) && !themeMenu.contains(e.target)) {
                themeMenu.classList.remove("show");
            }
        });

        const savedTheme = localStorage.getItem("onistar_theme");
        if(savedTheme && savedTheme !== "forest") {
            document.body.setAttribute("data-theme", savedTheme);
        } else {
            document.body.setAttribute("data-theme", "forest");
        }

        document.getElementById("searchInput").addEventListener("input", (e) => { searchTerm = e.target.value; currentPage = 1; renderGames(); });
        document.getElementById("closeDetailBtn").addEventListener("click", showMainView);

        updateStats();
        initFilters();
        renderGames();
    </script>
</body>
</html>
