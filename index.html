<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ONISTAR | Centered Light Blur Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    /* স্মুথ স্ক্রোল কোড - শুরুতে */
    html {
        scroll-behavior: smooth;
    }

    /* মসৃণ স্ক্রোলবারের জন্য */
    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: #d0d8d8;
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
        background: #9aacac;
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #7a8e8e;
    }
	
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #E0E5E5;
            min-height: 100vh;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            padding: 1rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background floating shapes */
        .bg-shape {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 12s ease-in-out infinite alternate;
            z-index: 0;
            opacity: 0.3;
        }
        .shape1 { background: #c5d0d0; top: -10%; left: -5%; }
        .shape2 { background: #d0dbdb; bottom: -10%; right: -5%; animation-delay: -5s; }
        .shape3 { background: #bcc7c7; top: 40%; left: 60%; width: 300px; height: 300px; animation-delay: -3s; }
        @keyframes float {
            0% { transform: translateY(0) translateX(0) scale(1);}
            100% { transform: translateY(40px) translateX(25px) scale(1.1);}
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Header - Centered */
        .glass-header {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2c3e3e, #1a2a2a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            background: linear-gradient(135deg, #e6b422, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.65rem;
            color: #5a6a6a;
            letter-spacing: 2px;
            margin-top: 0.3rem;
        }

        /* Stats Cards - Centered with Horizontal Scroll */
        .stats-wrapper {
            margin-bottom: 1.5rem;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .stats-wrapper::-webkit-scrollbar {
            height: 4px;
        }
        .stats-wrapper::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .stats-wrapper::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .stats-grid {
            display: flex;
            gap: 0.6rem;
            min-width: min-content;
            justify-content: center;
        }
        .stat-card {
            background: #E0E5E5;
            backdrop-filter: blur(1px);
            border-radius: 0.7rem;
            padding: 0.4rem 0.7rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.2s;
            min-width: 70px;
            flex-shrink: 0;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.75);
        }
        .stat-number {
            font-size: 0.9rem;
            font-weight: 800;
            background: linear-gradient(145deg, #2c3e3e, #1e2e2e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #4a5a5a;
            font-weight: 600;
            margin-top: 0.2rem;
        }

        /* ========== STICKY LIGHT BLUR SEARCH BAR ========== */
        .sticky-search-wrapper {
            position: sticky;
            top: 0.5rem;
            z-index: 100;
            margin-bottom: 1.5rem;
        }
        
        .blur-search-bar-container {
            position: relative;
            border-radius: 1.5rem;
            background: rgba(220, 230, 230, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }
        
        .search-bar-content {
            padding: 0.8rem 1.2rem;
        }
        
        .blur-search-input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 245, 0.7);
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2e2a;
            font-family: 'Poppins', sans-serif;
        }
        .blur-search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            border-color: #c0d0b0;
        }
        
        /* Filter sections - BUTTONS IN SINGLE LINE */
        .filter-section {
            margin-top: 0.6rem;
        }
        .filter-title {
            font-size: 0.55rem;
            font-weight: 700;
            color: #4a5e5a;
            letter-spacing: 1.5px;
            margin-bottom: 0.3rem;
            padding-left: 0.5rem;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.4rem;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            padding-bottom: 0.3rem;
        }
        .filter-buttons::-webkit-scrollbar {
            height: 3px;
        }
        .filter-buttons::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .filter-buttons::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .filter-btn {
            background: rgba(250, 252, 250, 0.75);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(180, 190, 170, 0.5);
            padding: 0.1rem 0.8rem;
            border-radius: 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #3a4e4a;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn:hover {
            background: rgba(255, 250, 220, 0.9);
            transform: scale(1.02);
        }
        .filter-btn.active {
            background: #2c3e3e;
            border-color: #2c3e3e;
            color: white;
            font-weight: 700;
        }

        /* ========== GAME CARDS ========== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem;
            display: flex;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }
        .game-card:hover {
            transform: translateY(-4px) scale(1.01);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border-color: rgba(255, 245, 200, 0.8);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.12);
        }
        .game-icon {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .game-info {
            flex: 1;
        }
        .game-name {
            font-size: 1rem;
            font-weight: 800;
            color: #1a2a2a;
            letter-spacing: -0.3px;
        }
        .game-package {
            font-size: 0.6rem;
            color: #5a6a6a;
            font-family: monospace;
            margin: 0.2rem 0 0.5rem;
        }
        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .tag {
            font-size: 0.55rem;
            padding: 0.15rem 0.6rem;
            border-radius: 1.2rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            font-weight: 600;
        }
        .tag.android { background: rgba(165, 215, 110, 0.55); color: #1e4a1a; }
        .tag.ios { background: rgba(210, 225, 250, 0.75); color: #2c3a6a; }
        .tag.appsflyer { background: rgba(0, 160, 210, 0.4); color: #005577; }
        .tag.adjust { background: rgba(255, 140, 80, 0.4); color: #884d00; }
        .tag.singular { background: rgba(140, 100, 200, 0.4); color: #3a2260; }
        .status-badge { background: rgba(100, 180, 100, 0.35); color: #2a6a2a; border: 1px solid rgba(100, 150, 70, 0.4); }

        /* Pagination - Centered */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }
        .page-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 0.4rem 0.8rem;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4a5a5a;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: scale(1.03);
        }
        .page-btn.active {
            background: #2c3e3e;
            border-color: #2c3e3e;
            color: white;
        }
        .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Detail View */
        .detail-view {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 1.5rem;
            padding: 1.5rem;
            min-height: 400px;
        }
        .detail-view::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            z-index: 0;
        }
        .detail-content {
            position: relative;
            z-index: 2;
            color: white;
        }
        .detail-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
            border: 1px solid rgba(255,215,120,0.6);
        }
        .detail-name {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
        }
        .detail-package {
            text-align: center;
            font-family: monospace;
            margin: 0.5rem 0 1rem;
            opacity: 0.8;
            font-size: 0.7rem;
        }
        .detail-info {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(16px);
            border-radius: 1.2rem;
            padding: 1rem;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,215,120,0.2);
            font-size: 0.8rem;
        }
        .back-btn {
            background: #1a1a2e;;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 0.6rem;
            border-radius: 1.5rem;
            width: 100%;
            margin-top: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.35);
        }
        .hidden { display: none; }
        .no-results {
            text-align: center;
            padding: 2rem;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            color: #6a7a6a;
            font-size: 0.8rem;
        }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.6rem;
            color: #6a7a7a;
            padding: 0.8rem;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
        }

        @media (max-width: 680px) {
            body { padding: 0.8rem; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 0.8rem; }
            .stat-card {
                padding: 0.5rem 0.8rem;
                min-width: 60px;
            }
            .stat-number {
                font-size: 1rem;
            }
            .stat-label {
                font-size: 0.55rem;
            }
            .stats-grid {
                justify-content: flex-start;
            }
        }
        
        @media (min-width: 768px) {
            .stats-grid {
                justify-content: center;
            }
            .filter-buttons {
                justify-content: center;
                flex-wrap: wrap;
                overflow-x: visible;
            }
        }
    </style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="bg-shape shape3"></div>

<div class="container">
    <div id="mainView">
        <div class="glass-header">
            <div class="logo">ONI<span>STAR</span></div>
            <div class="subtitle">✦ LIGHT BLUR STICKY SEARCH ✦</div>
        </div>

        <!-- Stats Cards with Horizontal Scroll - Centered on PC -->
        <div class="stats-wrapper">
            <div class="stats-grid" id="stats"></div>
        </div>

        <!-- Sticky Search Bar Wrapper -->
        <div class="sticky-search-wrapper">
            <div class="blur-search-bar-container">
                <div class="search-bar-content">
                    <input type="text" class="blur-search-input" id="searchInput" placeholder="🔍 search game or package...">
                    <div class="filter-section">
                        <div class="filter-title">PLATFORM</div>
                        <div class="filter-buttons" id="platformFilters">
                            <button class="filter-btn active" data-platform="all">ALL</button>
                            <button class="filter-btn" data-platform="android">🤖 ANDROID</button>
                            <button class="filter-btn" data-platform="ios">🍎 IOS</button>
                        </div>
                    </div>
                    <div class="filter-section">
                        <div class="filter-title">PROVIDER</div>
                        <div class="filter-buttons" id="providerFilters">
                            <button class="filter-btn active" data-provider="all">ALL</button>
                            <button class="filter-btn" data-provider="appsflyer">📡 APPSFLYER</button>
                            <button class="filter-btn" data-provider="adjust">📊 ADJUST</button>
                            <button class="filter-btn" data-provider="singular">🎯 SINGULAR</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Games Grid -->
        <div class="games-grid" id="gamesList">🎮 loading games...</div>
        <div class="pagination" id="pagination"></div>
        <div class="footer">ONISTAR • S2S BYPASS • LIGHT BLUR SYSTEM</div>
    </div>

    <div id="detailView" class="hidden">
        <div class="detail-view" id="detailContent"></div>
        <button class="back-btn" onclick="showMainView()">🔙 BACK TO GAMES</button>
    </div>
</div>

<script>
    // Game Database
    const GAMES_DB = {
        "appsflyer": {
            "domino_dreams": { "name": "Domino Dreams", "package": "com.screenshake.dominodreams", "android": true, "ios": false, "icon": "🎲", "image": "https://play-lh.googleusercontent.com/_brT-4DSyZtx1SBTfL3yMQtytM_dPBIOaOMlGF7dG67Yw9rKe4oVj3OSt96hO7w1t2Q=s48-rw", "dev_key": "Hn5qYjVAaRNJYDcwF4LaWF", "event_format": "af_area_{}_completed", "added_date": "2024-01-15" },
            "sunshine_island": { "name": "Sunshine Island", "package": "com.newmoonproduction.sunshineisland", "android": true, "ios": false, "icon": "🏝️", "image": "https://play-lh.googleusercontent.com/CJum7I6RZyYd7hQ_qpPgg1PyErE8jJbNiF2-yOmH86lW16wKpEPoZ1dOHFswGkwLcA=s48-rw", "dev_key": "FtaT5WH9rMJjJkMd4LfBCT", "event_format": "af_level{}_achieved", "added_date": "2024-01-20" },
            "nations_of_darkness": { "name": "Nations of Darkness", "package": "com.allstarunion.nod", "android": true, "ios": true, "icon": "🌑", "image": "https://play-lh.googleusercontent.com/f8nIYbPI7TZtTQt3R4R_YBgQ5QdYpZQcZi2vU6cYv6o-TIq5VXpM0dE8q4DlF1Q=s48-rw", "dev_key": "x88hdqNmd8vALRmRMhgY4Q", "event_format": "af_upgrade_city_lv_{}", "added_date": "2024-01-10" },
            "dice_dreams": { "name": "Dice Dreams", "package": "com.superplaystudios.dicedreams", "android": true, "ios": false, "icon": "🎲", "image": "https://play-lh.googleusercontent.com/5MLgC2WWXcq1Pol8qRAXOKzIJY9qySkjF43DnWyd5F9fPj_heinHeIxvgIpPQwcaQ1w-mUzUmoP1Xeslf29irg=s48-rw", "bg_image": "https://play-lh.googleusercontent.com/jZxrlBZlBckylCQbtdTF082laUuKjg0H9xzAtDgZG9vJeFx9KZHGZiS_VXkJ4SG9vxFxbeFw0m4RSgLbxXrW", "dev_key": "Hn5qYjVAaRNJYDcwF4LaWF", "event_format": "af_kingdom_{}_restored", "added_date": "2024-01-25" }
        },
        "adjust": {
            "mythic_raid": { "name": "Mythic Raid", "package": "com.adjust.mythicraid", "android": true, "ios": true, "icon": "⚔️", "image": "", "dev_key": "adj_mythic123", "event_format": "adjust_raid_boss_{}", "added_date": "2024-02-10" }
        },
        "singular": {
            "shadow_legends": { "name": "Shadow Legends", "package": "com.singular.shadow", "android": true, "ios": true, "icon": "👑", "image": "", "dev_key": "sing_shadow456", "event_format": "singular_battle_{}", "added_date": "2024-03-01" }
        }
    };

    let allGames = [];
    for (const [provider, games] of Object.entries(GAMES_DB)) {
        for (const [id, game] of Object.entries(games)) {
            allGames.push({ id, provider, ...game });
        }
    }
    // extra games
    for (let i = 1; i <= 14; i++) {
        const prov = i % 3 === 0 ? "adjust" : (i % 2 === 0 ? "singular" : "appsflyer");
        allGames.push({
            id: `extra_${i}`, provider: prov, name: `${prov === 'appsflyer' ? 'Aurora' : prov === 'adjust' ? 'Vortex' : 'Eclipse'} Game ${i}`,
            package: `com.blur.${prov}.game${i}`, android: true, ios: i % 2 === 0, icon: "🎮",
            dev_key: `blurkey_${i}`, event_format: `blur_event_${i}_{}`, added_date: "2024-04-10"
        });
    }

    let currentPlatform = "all", currentProvider = "all", searchTerm = "", currentPage = 1;
    const gamesPerPage = 12;

    function getGameIcon(g) { return (g.image && g.image.startsWith("http")) ? `<img src="${g.image}" alt="${g.name}">` : g.icon; }
    
    function updateStats() {
        document.getElementById("stats").innerHTML = `
            <div class="stat-card"><div class="stat-number">${allGames.length}</div><div class="stat-label">TOTAL</div></div>
            <div class="stat-card"><div class="stat-number">${allGames.filter(g=>g.provider==="appsflyer").length}</div><div class="stat-label">APPSFLYER</div></div>
            <div class="stat-card"><div class="stat-number">${allGames.filter(g=>g.provider==="adjust").length}</div><div class="stat-label">ADJUST</div></div>
            <div class="stat-card"><div class="stat-number">${allGames.filter(g=>g.provider==="singular").length}</div><div class="stat-label">SINGULAR</div></div>
            <div class="stat-card"><div class="stat-number">${allGames.length}</div><div class="stat-label">ACTIVE</div></div>
        `;
    }

    function getFiltered() {
        return allGames.filter(g => {
            if (searchTerm && !g.name.toLowerCase().includes(searchTerm.toLowerCase()) && !g.package.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            if (currentPlatform !== "all") { if (currentPlatform === "android" && !g.android) return false; if (currentPlatform === "ios" && !g.ios) return false; }
            if (currentProvider !== "all" && g.provider !== currentProvider) return false;
            return true;
        });
    }

    function renderGames() {
        const filtered = getFiltered();
        const totalPages = Math.ceil(filtered.length / gamesPerPage);
        const start = (currentPage-1)*gamesPerPage;
        const gamesToShow = filtered.slice(start, start+gamesPerPage);
        const container = document.getElementById("gamesList");
        if (!gamesToShow.length) { container.innerHTML = `<div class="no-results">🎮 NO GAMES FOUND</div>`; document.getElementById("pagination").innerHTML = ""; return; }
        let html = "";
        gamesToShow.forEach(g => {
            let tags = `<span class="tag ${g.provider}">📡 ${g.provider.toUpperCase()}</span>`;
            if(g.android) tags += `<span class="tag android">🤖 ANDROID</span>`;
            if(g.ios) tags += `<span class="tag ios">🍎 IOS</span>`;
            tags += `<span class="tag status-badge">● ACTIVE</span>`;
            html += `<div class="game-card" onclick='showDetail("${g.id}","${g.provider}")'>
                <div class="game-icon">${getGameIcon(g)}</div>
                <div class="game-info">
                    <div class="game-name">${escapeHtml(g.name)}</div>
                    <div class="game-package">${g.package}</div>
                    <div class="game-tags">${tags}</div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        renderPagination(totalPages);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    function renderPagination(tp) {
        if (tp <= 1) { document.getElementById("pagination").innerHTML = ""; return; }
        let html = `<button class="page-btn ${currentPage===1?'disabled':''}" onclick="changePage(${currentPage-1})">◀ PREV</button>`;
        let s = Math.max(1, currentPage-2), e = Math.min(tp, currentPage+2);
        if (s > 1) { html += `<button class="page-btn" onclick="changePage(1)">1</button>`; if (s > 2) html += `<span style="padding:0 4px;">...</span>`; }
        for (let i = s; i <= e; i++) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
        if (e < tp) { if (e < tp-1) html += `<span style="padding:0 4px;">...</span>`; html += `<button class="page-btn" onclick="changePage(${tp})">${tp}</button>`; }
        html += `<button class="page-btn ${currentPage===tp?'disabled':''}" onclick="changePage(${currentPage+1})">NEXT ▶</button>`;
        document.getElementById("pagination").innerHTML = html;
    }

    function changePage(page) {
        currentPage = page;
        renderGames();
        
        // মোবাইল ও পিসি সাপোর্ট সহ স্মুথ স্ক্রোল
        setTimeout(() => {
            window.scrollTo({
                top: 0,
                left: 0,
                behavior: 'smooth'
            });
        }, 100);
    }

    function showDetail(id, provider) {
        const game = GAMES_DB[provider]?.[id];
        if (!game) return;
        const platforms = []; if (game.android) platforms.push("🤖 Android"); if (game.ios) platforms.push("🍎 iOS");
        const dv = document.querySelector(".detail-view");
        if (game.bg_image) dv.style.backgroundImage = `url('${game.bg_image}')`;
        else dv.style.background = "#1e2a2a";
        const detailHtml = `<div class="detail-content"><div class="detail-icon">${getGameIcon(game)}</div><div class="detail-name">${escapeHtml(game.name)}</div><div class="detail-package">${game.package}</div><div class="detail-info">
            <div class="detail-row"><span class="detail-label">Provider</span><span class="detail-value">📡 ${provider.toUpperCase()}</span></div>
            <div class="detail-row"><span class="detail-label">Platform</span><span class="detail-value">${platforms.join(" | ")}</span></div>
            <div class="detail-row"><span class="detail-label">Dev Key</span><span class="detail-value">${game.dev_key || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Event Format</span><span class="detail-value">${game.event_format || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Added</span><span class="detail-value">${game.added_date || '—'}</span></div>
        </div></div>`;
        document.getElementById("detailContent").innerHTML = detailHtml;
        document.getElementById("mainView").classList.add("hidden");
        document.getElementById("detailView").classList.remove("hidden");
    }
    
    function showMainView() { document.getElementById("mainView").classList.remove("hidden"); document.getElementById("detailView").classList.add("hidden"); renderGames(); updateStats(); }

    // Event Listeners
    document.querySelectorAll("#platformFilters .filter-btn").forEach(btn => {
